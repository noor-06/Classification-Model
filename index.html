<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Image Analysis</title>
    
    <link rel="stylesheet" type="text/css" href="style.css">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo"><i class="fa-solid fa-satellite"></i> SentinelUI</div>
        <a href="#" class="nav-item active"><i class="fa-solid fa-layer-group"></i> Classification</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-chart-line"></i> Trends</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-map"></i> Live Map</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
    </div>

    <div class="main-content">
        <div class="header">
            <div><i class="fa-solid fa-bars" style="cursor:pointer;"></i></div>
            <div><i class="fa-solid fa-bell"></i> User Profile</div>
        </div>

        <div class="dashboard-container">
            <h2 class="page-title">1. Batch Classification Dashboard</h2>
            
            <div class="grid-layout">
                
                <div class="left-col">
                    <div class="card">
                        <div class="dropzone" id="imageDropzone">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <h3>Upload Image Batch (Max 20)</h3>
                            <p>Drag and drop satellite images here</p>
                        </div>
                    </div>

                    <div class="card queue-list">
                        <h3>Queue</h3>
                        <div class="queue-item">
                            <div style="display:flex; align-items:center; gap:15px;">
                                <div class="queue-img" style="background:#ddd;"></div>
                                <span>SA_Region_01.tif</span>
                            </div>
                            <span class="status-badge status-processing">Processing (0.12s)</span>
                        </div>
                        <div class="queue-item">
                            <div style="display:flex; align-items:center; gap:15px;">
                                <div class="queue-img" style="background:#ccc;"></div>
                                <span>Asia_Region_42.tif</span>
                            </div>
                            <span class="status-badge status-urban">URBAN (Confirmed)</span>
                        </div>
                    </div>
                </div>

              <div class="right-col">
    <div class="card" style="margin-bottom: 20px;">
        <h4 style="margin-bottom: 15px;">Overall Distribution</h4>
        <div style="position: relative; height: 220px;">
            <canvas id="donutChart1"></canvas>
        </div>
    </div>
    <div class="card">
        <h4 style="margin-bottom: 15px;">Processed Classes</h4>
        <div style="position: relative; height: 220px;">
            <canvas id="donutChart2"></canvas>
        </div>
    </div>
</div>

            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
