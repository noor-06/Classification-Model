<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trends - Satellite Analysis</title>
    
    <link rel="stylesheet" type="text/css" href="css/style.css">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo"><i class="fa-solid fa-satellite"></i> SentinelUI</div>
        <a href="index.html" class="nav-item"><i class="fa-solid fa-layer-group"></i> Classification</a>
        <a href="trend.html" class="nav-item active"><i class="fa-solid fa-chart-line"></i> Trends</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-map"></i> Live Map</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
    </div>

    <div class="main-content">
        <div class="header">
            <div><i class="fa-solid fa-bars" style="cursor:pointer;"></i></div>
            <div><i class="fa-solid fa-bell"></i> User Profile</div>
        </div>

        <div class="dashboard-container">
            <h2 class="page-title">2. Time-Series Trends</h2>
            
            <div class="grid-layout">
                <div class="left-col">
                    <div class="card">
                        <h4 style="margin-bottom: 15px;">Land Cover Change over 10 Years (2015-2025)</h4>
                        <div style="position: relative; height: 300px;">
                            <canvas id="trendLineChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="right-col">
                    <div class="card">
                        <h4 style="margin-bottom: 15px;">Target Region</h4>
                        <div id="miniMap" style="height: 300px; border-radius: 8px; z-index: 1;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="js/app.js"></script>
</body>
</html>
